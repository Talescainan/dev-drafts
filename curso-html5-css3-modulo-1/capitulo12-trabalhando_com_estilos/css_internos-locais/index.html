<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revision CSS Internal</title>
<style>
    h1 {
        color: rgb(255, 0, 0);
    }
    h2 {
        color: rgb(128, 0, 0);
        mark {
            background-color: rgb(0, 143, 131);
        }
    }
</style>

</head>
<body>
    <h1>CSS Internos</h1>
    <h2>O que é <mark>CSS Internos?</mark></h2>

    <p>CSS internos são aplicados diretamente no documento HTML dentro da tag <code>&lt;head&gt;</code></p>

    <!-- O CSS interno é uma forma de aplicar estilos diretamente dentro do documento HTML, utilizando a tag <style> dentro do elemento <head>. Ele é útil para aplicar estilos específicos a um único documento, sem a necessidade de criar um arquivo CSS separado. O CSS interno tem uma prioridade menor do que o CSS inline, mas maior do que o CSS externo. Ele é aplicado a todas as tags que correspondem aos seletores definidos dentro da tag <style>. No entanto, o uso excessivo de CSS interno pode tornar o código difícil de manter e ler, por isso é recomendado usar CSS externo para estilos mais complexos e reutilizáveis. -->


</body>
</html>
