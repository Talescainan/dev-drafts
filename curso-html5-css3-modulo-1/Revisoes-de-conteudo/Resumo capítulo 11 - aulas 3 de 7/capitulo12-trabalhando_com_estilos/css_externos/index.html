<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS External</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1><mark>CSS External</mark></h1>
    <h2>O que são CSS externos?</h2>
    <p>CSS externos são aplicados em um arquivo separado do documento HTML, utilizando a tag <code>&lt;link&gt;</code> dentro da tag <code>&lt;head&gt;</code></p>

    <!-- O CSS externo é uma forma de aplicar estilos a um documento HTML utilizando um arquivo separado, que é vinculado ao documento HTML através da tag <link> dentro do elemento <head>. Ele é útil para aplicar estilos a vários documentos HTML, permitindo a reutilização de estilos e facilitando a manutenção do código. O CSS externo tem a menor prioridade em relação ao CSS inline e interno, ou seja, se houver um conflito entre estilos, o CSS externo será o último a ser aplicado. Ele é aplicado a todas as tags que correspondem aos seletores definidos no arquivo CSS. O uso de CSS externo é recomendado para estilos mais complexos e reutilizáveis, pois mantém o código organizado e fácil de manter. -->

</body>
</html>
