<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revision CSS Inline</title>
</head>
<body>
    <h1>CSS Inline</h1>
    <h2>O que é CSS Inline?</h2>
        <p>CSS inline se estabelece a aplicar estilos diretamente na tag, exemplo:</p>
        <p style="color: red;">Este texto é vermelho</p>
        <p style="color: blue;">Este texto é azul</p>
    <!-- Aqui aplico o estilo diretamente na tag, ou seja, o estilo é aplicado somente a esta tag, diferente do CSS externo e interno que pode ser aplicado a várias tags. O CSS inline tem a maior prioridade, ou seja, se houver um conflito entre estilos, o CSS inline irá prevalecer sobre os outros tipos de CSS. No entanto, o uso excessivo de CSS inline pode tornar o código difícil de manter e ler, por isso é recomendado usar CSS externo ou interno para estilos mais complexos e reutilizáveis. -->
</body>
</html>
